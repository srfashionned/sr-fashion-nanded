name: Auto Sync Inventory

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-inventory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Busy inventory
        env:
          INVENTORY_DATA_URL: ${{ secrets.INVENTORY_DATA_URL }}
        run: |
          if [ -z "$INVENTORY_DATA_URL" ]; then
            echo "INVENTORY_DATA_URL is not configured. Set it in repository secrets."
            exit 1
          fi
          node scripts/convertInventory.js

      - name: Commit updated inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add items.json
          if git diff --cached --quiet; then
            echo "No inventory changes detected."
            exit 0
          fi
          git commit -m "Auto-sync Busy inventory data"
          git push origin HEAD:${{ github.ref_name }}
